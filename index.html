<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeduzaProxy</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #07040d; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background-color: #120b1e; padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #23153c; }
        h1 { color: #ec4899; text-align: center; margin: 0 0 10px; }
        p { color: #a78bfa; text-align: center; margin-bottom: 20px; }
        .tariff { background: #1a102b; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #23153c; display: flex; justify-content: space-between; align-items: center; }
        .price { font-weight: bold; color: #00f2fe; }
        .btn { display: block; text-align: center; background: linear-gradient(135deg, #d946ef, #ec4899); color: white; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>MeduzaProxy</h1>
            <p>Безопасный доступ в интернет.</p>
        </div>

        <div class="card">
            <div class="tariff"><div>Тест</div><div class="price" id="price1">...</div></div>
            <div class="tariff"><div>Стандарт</div><div class="price" id="price2">...</div></div>
            <div class="tariff"><div>Максимум</div><div class="price" id="price3">...</div></div>
            <a href="#" id="downloadBtn" class="btn">Скачать MeduzaProxy</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const db = getDatabase(initializeApp({
          apiKey: "AIzaSyD6NKeaTQG1VGtLkzb6JD1_XhcnpWK8g9k",
          databaseURL: "https://meduza-admin-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "meduza-admin"
        }));

        onValue(ref(db, 'prices/price1'), (s) => document.getElementById('price1').innerText = s.val());
        onValue(ref(db, 'prices/price2'), (s) => document.getElementById('price2').innerText = s.val());
        onValue(ref(db, 'prices/price3'), (s) => document.getElementById('price3').innerText = s.val());
        onValue(ref(db, 'apkUrl'), (s) => document.getElementById('downloadBtn').href = s.val());
    </script>
</body>
</html>
