<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeduzaProxy</title>
    <style>
        body { font-family: sans-serif; background-color: #07040d; color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 450px; width: 100%; }
        .card { background-color: #120b1e; padding: 25px; border-radius: 24px; border: 1px solid #23153c; margin-bottom: 20px; }
        h1 { font-size: 28px; background: linear-gradient(135deg, #d946ef, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .tariff-item { background-color: #1a102b; border: 1px solid #2e1b4e; border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .tariff-price { font-weight: bold; color: #00f2fe; }
        .btn { display: block; text-align: center; background: linear-gradient(135deg, #d946ef, #ec4899); color: white; padding: 15px; border-radius: 14px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>MeduzaProxy</h1>
            <p style="text-align:center;">Безопасный доступ в интернет.</p>
        </div>
        <div class="card" id="tariffs">
            <div class="tariffs">
                <div class="tariff-item"><div><h3>Тест</h3></div><div class="tariff-price" id="price1">Загрузка...</div></div>
                <div class="tariff-item"><div><h3>Стандарт</h3></div><div class="tariff-price" id="price2">Загрузка...</div></div>
                <div class="tariff-item"><div><h3>Максимум</h3></div><div class="tariff-price" id="price3">Загрузка...</div></div>
            </div>
            <!-- Сюда будет автоматически подставляться ссылка из админки -->
            <a href="#" id="downloadBtn" class="btn">Скачать MeduzaProxy</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD6NKeaTQG1VGtLkzb6JD1_XhcnpWK8g9k",
          databaseURL: "https://meduza-admin-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "meduza-admin"
        };
        const db = getDatabase(initializeApp(firebaseConfig));

        onValue(ref(db, 'prices/price1'), (s) => document.getElementById('price1').innerText = s.val());
        onValue(ref(db, 'prices/price2'), (s) => document.getElementById('price2').innerText = s.val());
        onValue(ref(db, 'prices/price3'), (s) => document.getElementById('price3').innerText = s.val());
        onValue(ref(db, 'apkUrl'), (s) => document.getElementById('downloadBtn').href = s.val());
    </script>
</body>
</html>
